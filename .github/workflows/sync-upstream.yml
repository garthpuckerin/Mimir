name: Sync from Upstream

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  sync:
    uses: garthpuckerin/devops/.github/workflows/sync-fork.yml@main
    with:
      upstream: orneryd/Mimir
    secrets:
      SYNC_PAT: ${{ secrets.SYNC_PAT }}
    permissions:
      contents: write
      pull-requests: write
